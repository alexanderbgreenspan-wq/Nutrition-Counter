<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nutrition Tracker</title>
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #333;
    --text: #f0f0f0; --muted: #888; --accent: #4a9eff; --green: #4caf50;
    --yellow: #ffb300; --red: #f44336; --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  nav button { flex: 1; padding: 14px 4px; background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .screen { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
  .screen.active { display: block; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .card-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; padding: 10px 12px; width: 100%; outline: none; font-family: var(--font); }
  input:focus { border-color: var(--accent); }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .btn { display: block; width: 100%; padding: 13px; border-radius: 8px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
  .btn:active { opacity: .7; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-sm { font-size: 13px; padding: 7px 12px; width: auto; display: inline-block; }
  .alert { border-radius: 8px; padding: 12px; margin-bottom: 10px; font-size: 14px; font-weight: 500; }
  .alert-green { background: #1b3d1e; border: 1px solid var(--green); color: var(--green); }
  .alert-yellow { background: #3d2f00; border: 1px solid var(--yellow); color: var(--yellow); }
  .alert-red { background: #3d0f0f; border: 1px solid var(--red); color: var(--red); }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-box { background: var(--surface2); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-val { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat-sub { font-size: 11px; color: var(--muted); }
  .prog-wrap { margin-bottom: 10px; }
  .prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .prog-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: var(--surface2); padding: 10px 8px; text-align: right; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th:first-child { text-align: left; }
  td { padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--border); }
  td:first-child { text-align: left; }
  tr.summary-row td { background: var(--surface2); font-weight: 700; font-size: 13px; color: var(--accent); border-top: 2px solid var(--accent); }
  .dot-open { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-left: 4px; vertical-align: middle; }
  .meal-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .meal-item:last-child { border-bottom: none; }
  .meal-name { font-size: 14px; font-weight: 500; }
  .meal-macros { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .meal-del { background: none; border: none; color: var(--red); font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .search-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .search-item:hover { background: var(--surface2); }
  .search-item-name { font-size: 14px; font-weight: 500; }
  .search-item-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .tab-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: var(--muted); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: flex-end; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px; width: 100%; max-width: 600px; margin: 0 auto; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
  input[type=range] { padding: 0; background: none; border: none; accent-color: var(--accent); }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .mt { margin-top: 12px; }
  .mb { margin-bottom: 12px; }
  .text-muted { color: var(--muted); font-size: 13px; }
  .text-green { color: var(--green); }
  .hidden { display: none !important; }
  .spinner { text-align: center; padding: 20px; color: var(--muted); font-size: 14px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
</style>
</head>
<body>

  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqcGZmeGRudnNrenlvanNjc2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTE0NDAsImV4cCI6MjA5NjA4NzQ0MH0.bGEOaKtiMqWW-ZufL99Uk_hJkuWlHkmx8Q-REhos_tc';
</script>

<nav>
  <button class="active" onclick="showScreen('today',this)">Today</button>
  <button onclick="showScreen('log',this)">Log</button>
  <button onclick="showScreen('history',this)">History</button>
  <button onclick="showScreen('settings',this)">Settings</button>
</nav>

<!-- TODAY SCREEN -->
<div id="screen-today" class="screen active">
  <div id="alerts-container"></div>
  <div id="today-summary"></div>
</div>

<!-- LOG SCREEN -->
<div id="screen-log" class="screen">
  <div class="tab-row">
    <div class="tab active" onclick="switchLogTab('manual',this)">Manual</div>
    <div class="tab" onclick="switchLogTab('search',this)">USDA Search</div>
    <div class="tab" onclick="switchLogTab('library',this)">Library</div>
    <div class="tab" onclick="switchLogTab('newday',this)" style="color:var(--yellow)">New Day</div>
  </div>

  <div id="log-manual">
    <div class="card">
      <div class="card-title">Manual entry</div>
      <div class="mb">
        <label>Meal name (optional)</label>
        <input type="text" id="manual-name" placeholder="e.g. Hanamaru udon">
      </div>
      <div class="row mb">
        <div><label>Calories (kcal)</label><input type="number" id="manual-cal" step="0.1" placeholder="0"></div>
        <div><label>Protein (g)</label><input type="number" id="manual-pro" step="0.1" placeholder="0"></div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text);margin-bottom:12px">
        <input type="checkbox" id="manual-save" style="width:auto"> Save to library
      </label>
      <button class="btn btn-primary" onclick="logManual()">Add to today</button>
    </div>
  </div>

  <div id="log-search" class="hidden">
    <div class="card">
      <div class="card-title">USDA FoodData Central</div>
      <div class="row mb">
        <input type="text" id="usda-query" placeholder="Search food..." onkeydown="if(event.key==='Enter')searchUSDA()">
        <button class="btn btn-primary btn-sm" onclick="searchUSDA()" style="flex:0 0 70px">Go</button>
      </div>
      <div id="usda-results"></div>
    </div>
    <div class="card hidden" id="usda-confirm-card">
      <div class="card-title">Confirm & adjust</div>
      <div id="usda-confirm-name" style="font-weight:600;margin-bottom:10px"></div>
      <div class="row mb">
        <div><label>Serving size (g)</label><input type="number" id="usda-serving" step="1" placeholder="100" oninput="recalcUSDA()"></div>
        <div><label>Reference size (g)</label><input type="number" id="usda-ref" step="1" disabled></div>
      </div>
      <div class="row mb">
        <div><label>Calories</label><input type="number" id="usda-final-cal" step="0.1"></div>
        <div><label>Protein (g)</label><input type="number" id="usda-final-pro" step="0.1"></div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text);margin-bottom:12px">
        <input type="checkbox" id="usda-save" style="width:auto"> Save to library
      </label>
      <button class="btn btn-primary" onclick="logUSDA()">Add to today</button>
    </div>
  </div>

  <div id="log-library" class="hidden">
    <div class="card">
      <div class="card-title">Saved meals</div>
      <input type="text" id="library-search" placeholder="Search saved meals..." oninput="renderLibrary()" style="margin-bottom:12px">
      <div id="library-list"><div class="text-muted">No saved meals yet.</div></div>
    </div>
  </div>

  <div id="log-newday" class="hidden">
    <div class="card">
      <div class="card-title">New Day</div>
      <div class="text-muted mb" style="font-size:13px">Locks today into history and opens a fresh day.</div>
      <div class="mb">
        <label>Morning weight (kg)</label>
        <input type="number" id="newday-weight" step="0.1" placeholder="e.g. 90.4">
      </div>
      <div class="text-muted mb" id="newday-label" style="font-size:13px"></div>
      <button class="btn btn-primary" onclick="submitWeighIn()">Lock in & start new day</button>
    </div>
  </div>
</div>

<!-- HISTORY SCREEN -->
<div id="screen-history" class="screen">
  <div class="card">
    <div class="card-title">Tracking history</div>
    <div class="tbl-wrap">
      <table id="history-table">
        <thead><tr><th>Day</th><th>Weight</th><th>kcal</th><th>Protein</th></tr></thead>
        <tbody id="history-body"><tr><td colspan="4" class="spinner">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- SETTINGS SCREEN -->
<div id="screen-settings" class="screen">
  <div class="card">
    <div class="card-title">Targets</div>
    <div class="mb"><label>Calorie ceiling (kcal)</label><input type="number" id="s-cal-ceil" value="2400"></div>
    <div class="mb"><label>Protein floor (g)</label><input type="number" id="s-pro-floor" value="88"></div>
    <div class="mb"><label>Protein ceiling (g)</label><input type="number" id="s-pro-ceil" value="168"></div>
    <div class="mb"><label>Fat loss ratio (%) — used in TDEE formula</label><input type="number" id="s-fat-ratio" value="100" step="1" min="1" max="100"></div>
    <button class="btn btn-primary" onclick="saveSettings()">Save settings</button>
  </div>
</div>

<!-- LIBRARY PORTION MODAL -->
<div class="modal-overlay hidden" id="lib-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeLibModal()">×</button>
    <div class="modal-title" id="lib-modal-title">Re-log meal</div>
    <div id="lib-modal-macros" class="text-muted mb" style="font-size:14px"></div>
    <label>Portion: <span id="pct-display">100%</span></label>
    <input type="range" id="pct-slider" min="1" max="200" value="100" oninput="updatePctDisplay()" style="margin:10px 0 4px;width:100%">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)"><span>1%</span><span>100%</span><span>200%</span></div>
    <hr class="divider">
    <div id="lib-modal-adjusted" style="font-size:15px;font-weight:600;margin-bottom:16px"></div>
    <button class="btn btn-primary" onclick="confirmLibLog()">Add to today</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb;
try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

let cfg = { calCeil: 2400, proFloor: 88, proCeil: 168, fatRatio: 1.0 };
let todayDay = null;
let todayMeals = [];
let historyDays = [];
let libMeals = [];
let libPending = null;
let usdaPending = null;

function showScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'today') renderToday();
}

async function loadSettings() {
  if (!sb) return;
  const { data } = await sb.from('settings').select('*');
  if (!data) return;
  data.forEach(r => {
    if (r.key === 'calCeil') cfg.calCeil = +r.value;
    if (r.key === 'proFloor') cfg.proFloor = +r.value;
    if (r.key === 'proCeil') cfg.proCeil = +r.value;
    if (r.key === 'fatRatio') cfg.fatRatio = +r.value;
  });
  document.getElementById('s-cal-ceil').value = cfg.calCeil;
  document.getElementById('s-pro-floor').value = cfg.proFloor;
  document.getElementById('s-pro-ceil').value = cfg.proCeil;
  document.getElementById('s-fat-ratio').value = +(cfg.fatRatio * 100).toFixed(0);
}

async function saveSettings() {
  cfg.calCeil = +document.getElementById('s-cal-ceil').value;
  cfg.proFloor = +document.getElementById('s-pro-floor').value;
  cfg.proCeil = +document.getElementById('s-pro-ceil').value;
  cfg.fatRatio = +document.getElementById('s-fat-ratio').value / 100;
  if (!sb) { alert('Supabase not configured.'); return; }
  const rows = [
    { key: 'calCeil', value: String(cfg.calCeil) },
    { key: 'proFloor', value: String(cfg.proFloor) },
    { key: 'proCeil', value: String(cfg.proCeil) },
    { key: 'fatRatio', value: String(cfg.fatRatio) },
  ];
  await sb.from('settings').upsert(rows, { onConflict: 'key' });
  alert('Settings saved.');
  renderToday();
}

async function loadHistory() {
  if (!sb) return;
  const { data } = await sb.from('days').select('*').eq('locked', true).order('id', { ascending: true });
  historyDays = data || [];
  if (historyDays.length > 35) historyDays = historyDays.slice(-35);
}

async function loadTodayMeals() {
  if (!sb || !todayDay) return;
  const { data } = await sb.from('meals_today').select('*').eq('day_id', todayDay).order('logged_at', { ascending: true });
  todayMeals = data || [];
}

async function loadLibrary() {
  if (!sb) return;
  const { data } = await sb.from('library').select('*').order('name', { ascending: true });
  libMeals = data || [];
}

async function detectOpenDay() {
  if (!sb) return;
  const { data } = await sb.from('days').select('*').eq('locked', false).maybeSingle();
  if (data) {
    todayDay = data.id;
    await loadTodayMeals();
  }
}

async function submitWeighIn() {
  const w = parseFloat(document.getElementById('newday-weight').value);
  if (!w) { alert('Please enter your weight.'); return; }
  if (!sb) { alert('Supabase not configured.'); return; }

  const maxDay = historyDays.length > 0 ? Math.max(...historyDays.map(d => d.id)) : 0;
  const dayNum = todayDay !== null ? todayDay + 1 : maxDay + 1;

  // Lock current open day
  if (todayDay !== null) {
    const totalCal = todayMeals.reduce((s, m) => s + m.calories, 0);
    const totalPro = todayMeals.reduce((s, m) => s + m.protein, 0);
    await sb.from('days').update({
      calories: Math.round(totalCal),
      protein: Math.round(totalPro),
      locked: true
    }).eq('id', todayDay);
  }

  const today = new Date().toISOString().split('T')[0];
  const { error } = await sb.from('days').upsert({
    id: dayNum, date: today, weight_kg: w, calories: 0, protein: 0, locked: false
  }, { onConflict: 'id' });

  if (error) { alert('Error: ' + error.message); return; }
  todayDay = dayNum;
  todayMeals = [];

  await sb.from('days').delete().lt('id', dayNum - 35);
  await loadHistory();

  document.getElementById('newday-weight').value = '';
  showScreen('today', document.querySelector('nav button'));
  renderToday();
}

function renderToday() {
  const container = document.getElementById('today-summary');
  const totCal = todayDay === null ? 0 : +todayMeals.reduce((s, m) => s + m.calories, 0).toFixed(1);
  const totPro = todayDay === null ? 0 : +todayMeals.reduce((s, m) => s + m.protein, 0).toFixed(1);
  const past13 = historyDays.slice(-13).reduce((s, d) => s + (d.calories || 0), 0);
  const budget = 33600 - past13;
  const calPct = Math.min((totCal / cfg.calCeil) * 100, 100);
  const proPct = Math.min((totPro / cfg.proCeil) * 100, 100);
  const calBarColor = totCal >= cfg.calCeil ? 'var(--red)' : 'var(--accent)';
  const proBarColor = totPro >= cfg.proCeil ? 'var(--red)' : totPro >= cfg.proFloor ? 'var(--green)' : 'var(--yellow)';

  const mealsHTML = todayMeals.length === 0
    ? '<div class="text-muted">No meals logged yet.</div>'
    : todayMeals.map(m => `
      <div class="meal-item">
        <div>
          <div class="meal-name">${m.name || 'Meal'}</div>
          <div class="meal-macros">${m.calories} kcal · ${m.protein}g protein</div>
        </div>
        <button class="meal-del" onclick="deleteMeal('${m.id}')">×</button>
      </div>`).join('');

  container.innerHTML = `
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val">${totCal}</div>
        <div class="stat-label">kcal today</div>
        <div class="stat-sub">budget: ${budget}</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${totPro}g</div>
        <div class="stat-label">protein today</div>
        <div class="stat-sub">floor: ${cfg.proFloor}g</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Progress</div>
      <div class="prog-wrap">
        <div class="prog-label"><span>Calories</span><span>${totCal} / ${cfg.calCeil}</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${calPct}%;background:${calBarColor}"></div></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-label"><span>Protein</span><span>${totPro}g / ${cfg.proCeil}g</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${proPct}%;background:${proBarColor}"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Today's Max</div>
      <div style="font-size:22px;font-weight:700">${budget > 0 ? budget + ' kcal' : '⚠️ Over budget'}</div>
      <div class="text-muted mt" style="font-size:12px">Needed to bring 14-day average to 2,400</div>
    </div>
    <div class="card">
      <div class="card-title">Today's Meals <span class="dot-open"></span></div>
      ${mealsHTML}
    </div>
    <button class="btn btn-secondary mt" onclick="showScreen('log',null)">+ Log a meal</button>
  `;

  const alerts = [];
  if (totCal >= cfg.calCeil) alerts.push({ type: 'red', msg: '🔴 Calorie ceiling hit (' + cfg.calCeil + ' kcal)' });
  if (totPro >= cfg.proCeil) alerts.push({ type: 'red', msg: '🔴 Protein ceiling hit (' + cfg.proCeil + 'g)' });
  if (totPro >= cfg.proFloor && totPro < cfg.proCeil) alerts.push({ type: 'green', msg: '✅ Protein floor met (' + cfg.proFloor + 'g)' });
  document.getElementById('alerts-container').innerHTML = alerts.map(a => `<div class="alert alert-${a.type}">${a.msg}</div>`).join('');
}

async function addMeal(name, cal, pro, saveLib) {
  if (!sb || todayDay === null) { alert('Start a new day first via Log → New Day.'); return; }
  cal = +parseFloat(cal).toFixed(1);
  pro = +parseFloat(pro).toFixed(1);
  const { data, error } = await sb.from('meals_today').insert({ day_id: todayDay, name, calories: cal, protein: pro }).select().single();
  if (error) { alert('Error: ' + error.message); return; }
  todayMeals.push(data);
  if (saveLib) {
    await sb.from('library').upsert({ name, calories: cal, protein: pro }, { onConflict: 'name' });
    await loadLibrary();
  }
  renderToday();
}

async function deleteMeal(id) {
  if (!sb) return;
  await sb.from('meals_today').delete().eq('id', id);
  todayMeals = todayMeals.filter(m => m.id !== id);
  renderToday();
}

function logManual() {
  const name = document.getElementById('manual-name').value.trim() || 'Manual entry';
  const cal = document.getElementById('manual-cal').value;
  const pro = document.getElementById('manual-pro').value;
  const save = document.getElementById('manual-save').checked;
  if (!cal && !pro) { alert('Enter calories or protein.'); return; }
  addMeal(name, cal || 0, pro || 0, save);
  document.getElementById('manual-name').value = '';
  document.getElementById('manual-cal').value = '';
  document.getElementById('manual-pro').value = '';
  document.getElementById('manual-save').checked = false;
}

async function searchUSDA() {
  const q = document.getElementById('usda-query').value.trim();
  if (!q) return;
  document.getElementById('usda-results').innerHTML = '<div class="spinner">Searching…</div>';
  document.getElementById('usda-confirm-card').classList.add('hidden');
  try {
    const res = await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&pageSize=8&dataType=SR%20Legacy,Survey%20(FNDDS),Foundation&api_key=QchLTxDO9gwEsAbIEjwaXhrdqS22of1bFgrlMXoD`);
    const data = await res.json();
    const foods = data.foods || [];
    if (foods.length === 0) { document.getElementById('usda-results').innerHTML = '<div class="text-muted">No results found.</div>'; return; }
    document.getElementById('usda-results').innerHTML = foods.map(f => {
      const cal = (f.foodNutrients || []).find(n => n.nutrientId === 1008 || n.nutrientName?.includes('Energy'))?.value || 0;
      const pro = (f.foodNutrients || []).find(n => n.nutrientId === 1003 || n.nutrientName?.includes('Protein'))?.value || 0;
      return `<div class="search-item" onclick='selectUSDA(${JSON.stringify({ id: f.fdcId, name: f.description, cal, pro, ref: 100 })})'>
        <div class="search-item-name">${f.description}</div>
        <div class="search-item-detail">${Math.round(cal)} kcal · ${pro}g protein per 100g</div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('usda-results').innerHTML = '<div class="text-muted">Search failed.</div>';
  }
}

function selectUSDA(food) {
  usdaPending = food;
  document.getElementById('usda-confirm-card').classList.remove('hidden');
  document.getElementById('usda-confirm-name').textContent = food.name;
  document.getElementById('usda-serving').value = 100;
  document.getElementById('usda-ref').value = 100;
  document.getElementById('usda-final-cal').value = food.cal.toFixed(1);
  document.getElementById('usda-final-pro').value = food.pro.toFixed(1);
}

function recalcUSDA() {
  if (!usdaPending) return;
  const serving = parseFloat(document.getElementById('usda-serving').value) || 100;
  document.getElementById('usda-final-cal').value = (usdaPending.cal * serving / 100).toFixed(1);
  document.getElementById('usda-final-pro').value = (usdaPending.pro * serving / 100).toFixed(1);
}

function logUSDA() {
  if (!usdaPending) return;
  addMeal(usdaPending.name, document.getElementById('usda-final-cal').value, document.getElementById('usda-final-pro').value, document.getElementById('usda-save').checked);
  document.getElementById('usda-confirm-card').classList.add('hidden');
  document.getElementById('usda-results').innerHTML = '';
  document.getElementById('usda-query').value = '';
  usdaPending = null;
}

function renderLibrary() {
  const el = document.getElementById('library-list');
  const q = (document.getElementById('library-search')?.value || '').toLowerCase();
  const filtered = libMeals.filter(m => m.name.toLowerCase().includes(q));
  if (filtered.length === 0) {
    el.innerHTML = '<div class="text-muted">' + (libMeals.length === 0 ? 'No saved meals yet.' : 'No matches.') + '</div>';
    return;
  }
  el.innerHTML = filtered.map(m => `
    <div class="meal-item">
      <div>
        <div class="meal-name">${m.name}</div>
        <div class="meal-macros">${m.calories} kcal · ${m.protein}g protein</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openLibModal('${m.id}')">Log</button>
    </div>`).join('');
}

function openLibModal(id) {
  libPending = libMeals.find(m => m.id === id);
  if (!libPending) return;
  document.getElementById('lib-modal-title').textContent = libPending.name;
  document.getElementById('lib-modal-macros').textContent = libPending.calories + ' kcal · ' + libPending.protein + 'g protein (100%)';
  document.getElementById('pct-slider').value = 100;
  updatePctDisplay();
  document.getElementById('lib-modal').classList.remove('hidden');
}

function updatePctDisplay() {
  if (!libPending) return;
  const pct = parseInt(document.getElementById('pct-slider').value);
  document.getElementById('pct-display').textContent = pct + '%';
  const cal = (libPending.calories * pct / 100).toFixed(1);
  const pro = (libPending.protein * pct / 100).toFixed(1);
  document.getElementById('lib-modal-adjusted').textContent = cal + ' kcal · ' + pro + 'g protein';
}

function closeLibModal() {
  document.getElementById('lib-modal').classList.add('hidden');
  libPending = null;
}

function confirmLibLog() {
  if (!libPending) return;
  const pct = parseInt(document.getElementById('pct-slider').value);
  addMeal(libPending.name, (libPending.calories * pct / 100).toFixed(1), (libPending.protein * pct / 100).toFixed(1), false);
  closeLibModal();
}

function switchLogTab(tab, el) {
  document.querySelectorAll('#screen-log .tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  ['manual','search','library','newday'].forEach(t => document.getElementById('log-'+t).classList.add('hidden'));
  document.getElementById('log-' + tab).classList.remove('hidden');
  if (tab === 'library') renderLibrary();
  if (tab === 'newday') {
    const maxDay = historyDays.length > 0 ? Math.max(...historyDays.map(d => d.id)) : (todayDay || 0);
    const nextDay = todayDay !== null ? todayDay + 1 : maxDay + 1;
    document.getElementById('newday-label').textContent = 'This will be logged as Day ' + nextDay;
  }
}

function renderHistory() {
  const rows = [...historyDays];
  if (rows.length === 0) {
    document.getElementById('history-body').innerHTML = '<tr><td colspan="4" class="spinner">No data yet.</td></tr>';
    return;
  }
  const last14 = rows.slice(-14);
  const avgCal = last14.reduce((s, d) => s + (d.calories || 0), 0) / last14.length;
  const avgPro = last14.reduce((s, d) => s + (d.protein || 0), 0) / last14.length;
  const window35 = rows.slice(-35);
  const firstW = window35[0]?.weight_kg || 0;
  const lastW = window35[window35.length - 1]?.weight_kg || firstW;
  const kgLost = Math.max(0, firstW - lastW);
  const totalCal = window35.reduce((s, d) => s + (d.calories || 0), 0);
  const days = window35.length;
  const tdee = days > 0 ? Math.round((totalCal + kgLost * cfg.fatRatio * 7700) / days) : 0;
  document.getElementById('history-body').innerHTML = rows.map(d => `
    <tr>
      <td>Day ${d.id}</td>
      <td>${d.weight_kg ? d.weight_kg + ' kg' : '—'}</td>
      <td>${d.calories ?? '—'}</td>
      <td>${d.protein != null ? d.protein + 'g' : '—'}</td>
    </tr>`).join('') + `
    <tr class="summary-row">
      <td>TDEE: ${tdee} kcal</td>
      <td>—</td>
      <td>${Math.round(avgCal)}</td>
      <td>${Math.round(avgPro)}g</td>
    </tr>`;
}

async function init() {
  await loadSettings();
  await loadHistory();
  await detectOpenDay();
  await loadLibrary();
  renderToday();
}

init();
</script>
</body>
</html>
